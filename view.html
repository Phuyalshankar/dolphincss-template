<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">🐬 Dolphin UI — Component Viewer</title>
  <meta name="description" content="Live DolphinCSS component preview with source code, likes, and comments.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js" defer></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'fade-up': 'fadeUp 0.4s ease-out both',
            'fade-in': 'fadeIn 0.3s ease-out both',
          },
          keyframes: {
            fadeUp: { from: { opacity: 0, transform: 'translateY(12px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f1f5f9;
      background-image:
        radial-gradient(ellipse at 5% 0%,  rgba(99,102,241,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 95% 100%, rgba(34,211,238,0.05) 0%, transparent 50%);
    }
    [x-cloak] { display: none !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* Prism — keep dark for readability */
    pre[class*="language-"] {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      border-radius: 1rem !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 0.78rem !important;
      line-height: 1.7 !important;
      max-height: 480px !important;
      overflow-y: auto !important;
      margin: 0 !important;
    }
    code[class*="language-"] { font-family: 'JetBrains Mono', monospace !important; }

    /* Light-friendly category badges */
    .tag-elements    { background: #ede9fe; color: #6d28d9; border-color: #ddd6fe; }
    .tag-forms       { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; }
    .tag-interactive { background: #f3e8ff; color: #7c3aed; border-color: #e9d5ff; }
    .tag-feedback    { background: #d1fae5; color: #047857; border-color: #a7f3d0; }
    .tag-navigation  { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    .tag-layouts     { background: #fce7f3; color: #9d174d; border-color: #fbcfe8; }
    .tag-general     { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }

    .like-btn-liked  { background: #fff1f2; border-color: #fda4af; color: #e11d48; }
    .like-btn-liked:hover { background: #ffe4e6; }

    .preview-bg {
      background-color: #f8fafc;
      background-image: radial-gradient(rgba(99,102,241,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .topbar {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
  </style>
</head>
<body class="min-h-screen font-sans text-slate-700 antialiased" x-data="componentDetail()" x-init="init()">

  <!-- Sticky top bar -->
  <div class="topbar sticky top-0 z-50 py-3 px-6 mb-1">
    <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
      <a href="/" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors group font-medium">
        <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to Registry
      </a>
      <span class="text-slate-800 font-black text-base tracking-tight">🐬 Dolphin <span class="text-indigo-600">UI Bank</span></span>
    </div>
  </div>

  <div class="relative z-10 max-w-screen-2xl mx-auto px-5 sm:px-8 py-8">

    <!-- ── Loading ── -->
    <div x-show="loading" class="flex flex-col items-center justify-center py-40 gap-5">
      <div class="relative w-14 h-14">
        <div class="absolute inset-0 rounded-full border-4 border-indigo-100"></div>
        <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-indigo-500 animate-spin"></div>
      </div>
      <p class="text-slate-400 text-sm font-medium">Loading component...</p>
    </div>

    <!-- ── Error ── -->
    <div x-show="error && !loading" x-cloak class="max-w-md mx-auto text-center py-32">
      <div class="bg-red-50 border border-red-200 rounded-2xl p-10">
        <p class="text-4xl mb-3">🚫</p>
        <p class="text-red-600 font-bold mb-1.5">Component Not Found</p>
        <p class="text-slate-500 text-sm" x-text="error"></p>
        <a href="/" class="inline-block mt-5 bg-slate-100 hover:bg-slate-200 border border-slate-200 text-slate-600 px-4 py-2 rounded-xl text-xs font-semibold transition-all">← Go Home</a>
      </div>
    </div>

    <!-- ── Main Content ── -->
    <div x-show="!loading && !error" x-cloak class="space-y-8">

      <!-- ── Hero ── -->
      <header class="animate-fade-up">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-xs text-slate-600 font-mono mb-4">
          <a href="/" class="hover:text-slate-400 transition-colors">ui-bank</a>
          <span>/</span>
          <span class="text-slate-400" x-text="comp.category"></span>
          <span>/</span>
          <span class="text-indigo-400" x-text="comp.name"></span>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-6">
          <div class="space-y-3">
            <!-- ID badge + category -->
            <div class="flex items-center flex-wrap gap-2">
              <span class="text-xs font-mono text-slate-500 bg-slate-100 border border-slate-200 px-2.5 py-1 rounded-lg" x-text="'#' + comp.componentId"></span>
              <span
                class="text-xs font-bold uppercase tracking-wide px-2.5 py-1 rounded-full border"
                :class="'tag-' + comp.category"
                x-text="comp.category"
              ></span>
              <template x-for="tag in (comp.tags || [])" :key="tag">
                <span class="text-[10px] text-slate-500 bg-white/[0.03] border border-white/[0.06] px-2 py-0.5 rounded-full" x-text="tag"></span>
              </template>
            </div>

            <!-- Name -->
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight text-slate-900 leading-none" x-text="comp.name"></h1>
            <p class="text-slate-400 text-sm">by <span class="text-slate-600 font-medium" x-text="comp.author"></span></p>
          </div>

          <!-- Action Buttons -->
          <div class="flex flex-wrap gap-2 shrink-0">
            <!-- Like -->
            <button
              @click="handleLike()"
              :class="liked ? 'like-btn-liked' : 'bg-white border-slate-200 text-slate-500 hover:text-slate-800 hover:border-slate-300 shadow-sm'"
              class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl border text-sm font-semibold transition-all duration-200"
            >
              <span x-text="liked ? '❤️' : '🤍'"></span>
              <span x-text="comp.likes"></span>
              <span class="text-xs opacity-60">Likes</span>
            </button>

            <!-- Share -->
            <button
              @click="handleShare()"
              class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-slate-500 hover:text-slate-800 hover:border-slate-300 text-sm font-semibold transition-all duration-200 shadow-sm"
            >
              🔗 <span x-text="comp.shares"></span>
              <span class="text-xs opacity-60">Shares</span>
            </button>

            <!-- Copy Code -->
            <button
              @click="copyCode()"
              :class="copied ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : 'bg-indigo-600 border-indigo-600 text-white hover:bg-indigo-700 shadow-md shadow-indigo-200'"
              class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl border text-sm font-semibold transition-all duration-200"
            >
              <span x-text="copied ? '✅ Copied!' : '📋 Copy Code'"></span>
            </button>
          </div>
        </div>
      </header>

      <!-- ── Layout: 3 col ── -->
      <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">

        <!-- ── Left Column (2 cols) — Preview + Code ── -->
        <div class="xl:col-span-2 space-y-5">

          <!-- Live Preview -->
          <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
            <!-- Tab bar -->
            <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100 bg-slate-50">
              <div class="flex items-center gap-2">
                <div class="flex gap-1.5">
                  <div class="w-3 h-3 rounded-full bg-red-400"></div>
                  <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                  <div class="w-3 h-3 rounded-full bg-green-400"></div>
                </div>
                <span class="text-[11px] text-slate-400 font-mono ml-2" x-text="comp.name + '.html'"></span>
              </div>
              <div class="flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[10px] text-slate-400">Live Preview</span>
              </div>
            </div>
            <!-- Preview area — isolated iframe so DolphinCSS loads without Tailwind conflicts -->
            <div class="bg-[#080d1a] relative" style="min-height: 320px;">
              <iframe
                x-ref="previewFrame"
                :src="API_BASE + '/' + encodeURIComponent(comp.name) + '?preview=true'"
                id="preview-iframe"
                class="w-full border-0 block transition-all duration-300"
                style="height: 320px;"
                scrolling="no"
                @load="resizeIframe($event.target)"
              ></iframe>
            </div>
          </div>

          <!-- Code Viewer -->
          <div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-sm">
            <!-- Header -->
            <div class="flex items-center justify-between px-5 py-3 border-b border-slate-700 bg-slate-900">
              <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-indigo-400"></div>
                <span class="text-xs text-slate-400 font-mono">Source Code</span>
              </div>
              <span class="text-[10px] text-slate-500 font-mono">HTML</span>
            </div>
            <!-- Prism code -->
            <div class="p-4">
              <pre class="language-markup"><code class="language-markup" x-ref="codeBlock" x-text="comp.htmlCode"></code></pre>
            </div>
          </div>
        </div>

        <!-- ── Right Column ── -->
        <div class="space-y-5">

          <!-- Metadata card -->
          <div class="bg-white border border-slate-200 rounded-2xl p-6 space-y-4 shadow-sm">
            <h2 class="text-sm font-bold text-slate-800">Component Info</h2>
            <div class="space-y-0 text-sm divide-y divide-slate-100">
              <div class="flex justify-between items-center py-2.5">
                <span class="text-slate-400">Component ID</span>
                <span class="font-mono text-indigo-600 text-xs" x-text="comp.componentId"></span>
              </div>
              <div class="flex justify-between items-center py-2.5">
                <span class="text-slate-400">Category</span>
                <span class="text-slate-700 font-medium capitalize" x-text="comp.category"></span>
              </div>
              <div class="flex justify-between items-center py-2.5">
                <span class="text-slate-400">Author</span>
                <span class="text-slate-700 font-medium" x-text="comp.author"></span>
              </div>
              <div class="flex justify-between items-center py-2.5">
                <span class="text-slate-400">Likes</span>
                <span class="text-rose-500 font-semibold" x-text="comp.likes + ' ❤️'"></span>
              </div>
              <div class="flex justify-between items-center py-2.5">
                <span class="text-slate-400">Shares</span>
                <span class="text-sky-600 font-semibold" x-text="comp.shares + ' 🔗'"></span>
              </div>
              <div class="flex justify-between items-center py-2.5">
                <span class="text-slate-400">Comments</span>
                <span class="text-violet-600 font-semibold" x-text="comp.comments.length + ' 💬'"></span>
              </div>
            </div>
            <!-- Tags -->
            <div x-show="(comp.tags || []).length > 0" class="pt-2">
              <p class="text-xs text-slate-500 mb-2.5">Tags</p>
              <div class="flex flex-wrap gap-1.5">
                <template x-for="tag in (comp.tags || [])" :key="tag">
                  <span class="text-[10px] bg-slate-100 border border-slate-200 text-slate-500 px-2.5 py-0.5 rounded-full" x-text="tag"></span>
                </template>
              </div>
            </div>
          </div>

          <!-- Comments section -->
          <div class="bg-white border border-slate-200 rounded-2xl p-6 space-y-5 shadow-sm">
            <div class="flex items-center justify-between">
              <h2 class="text-sm font-bold text-slate-800">
                Comments <span class="text-slate-400 font-normal text-xs ml-1" x-text="'(' + comp.comments.length + ')'"></span>
              </h2>
            </div>

            <!-- Comment list -->
            <div class="space-y-3 max-h-72 overflow-y-auto pr-1" x-show="comp.comments.length > 0">
              <template x-for="(c, i) in comp.comments" :key="i">
                <div class="bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 space-y-1.5 animate-fade-in">
                  <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center text-[10px] font-bold text-white" x-text="c.user.charAt(0).toUpperCase()"></div>
                    <span class="text-xs font-semibold text-slate-700" x-text="c.user"></span>
                    <span class="text-[10px] text-slate-400 ml-auto" x-text="new Date(c.date).toLocaleDateString()"></span>
                  </div>
                  <p class="text-xs text-slate-500 leading-relaxed pl-8" x-text="c.text"></p>
                </div>
              </template>
            </div>

            <!-- Empty state -->
            <p x-show="comp.comments.length === 0" class="text-xs text-slate-400 text-center py-4">No comments yet. Be the first! 👇</p>

            <!-- Add Comment Form -->
            <form @submit.prevent="submitComment()" class="space-y-3 pt-3 border-t border-slate-100">
              <input
                x-model="newComment.user"
                type="text"
                placeholder="Your name"
                required
                class="w-full bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all"
              >
              <textarea
                x-model="newComment.text"
                placeholder="Write a comment..."
                rows="2"
                required
                class="w-full bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 placeholder-slate-400 resize-none focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all"
              ></textarea>
              <button
                type="submit"
                :disabled="submitting"
                class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-xs font-semibold py-2.5 rounded-xl transition-all shadow-sm"
                x-text="submitting ? 'Posting...' : '💬 Post Comment'"
              ></button>
            </form>
          </div>

        </div>
      </div>

      <!-- Bottom: similar components -->
      <section x-show="related.length > 0" x-cloak class="pt-4 animate-fade-up">
        <h2 class="text-lg font-bold text-slate-800 mb-5">More in <span class="text-indigo-600" x-text="comp.category"></span></h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
          <template x-for="rel in related" :key="rel._id">
            <a
              :href="'view.html?name=' + encodeURIComponent(rel.name)"
              class="group bg-white border border-slate-200 hover:border-indigo-300 hover:shadow-md rounded-xl overflow-hidden transition-all duration-200 hover:-translate-y-0.5 shadow-sm"
            >
              <div class="h-28 bg-slate-50 relative overflow-hidden border-b border-slate-100">
                <iframe
                  :src="API_BASE + '/' + encodeURIComponent(rel.name) + '?preview=true'"
                  class="absolute top-0 left-0 border-0 pointer-events-none"
                  style="width: 200%; height: 400px; transform: scale(0.5); transform-origin: top left;"
                  scrolling="no"
                  loading="lazy"
                ></iframe>
              </div>
              <div class="p-3">
                <p class="text-xs font-semibold text-slate-600 group-hover:text-indigo-600 transition-colors truncate" x-text="rel.name"></p>
              </div>
            </a>
          </template>
        </div>
      </section>

    </div><!-- end main content -->
  </div>

  <script>
    function componentDetail() {
      return {
        API_BASE: window.location.origin.startsWith('http')
          ? `${window.location.origin}/api/templates`
          : 'http://localhost:3000/api/templates',
        comp: {
          name: '',
          componentId: '',
          category: '',
          author: '',
          htmlCode: '',
          likes: 0,
          shares: 0,
          comments: [],
          tags: [],
        },
        related: [],
        loading: true,
        error: null,
        liked: false,
        copied: false,
        submitting: false,
        newComment: { user: '', text: '' },

        get compName() {
          const params = new URLSearchParams(window.location.search);
          return params.get('name') || '';
        },

        async init() {
          const name = this.compName;
          if (!name) { this.error = 'No component name provided.'; this.loading = false; return; }

          document.title = `🐬 ${name} — Dolphin UI Bank`;
          try {
            // Fetch details and HTML in parallel
            const [detailsRes, htmlRes] = await Promise.all([
              fetch(`${this.API_BASE}/${encodeURIComponent(name)}/details`),
              fetch(`${this.API_BASE}/${encodeURIComponent(name)}`),
            ]);
            const details = await detailsRes.json();
            const htmlText = await htmlRes.text();

            if (!details.success) { this.error = details.message || 'Component not found.'; this.loading = false; return; }

            this.comp = { ...details.data, htmlCode: htmlText };

            // Fetch related in same category
            const listRes = await fetch(`${this.API_BASE}/list`);
            const listData = await listRes.json();
            if (listData.success) {
              this.related = listData.data.filter(c => c.category === this.comp.category && c.name !== this.comp.name).slice(0, 5);
            }
          } catch (e) {
            this.error = 'Failed to load component: ' + e.message;
          } finally {
            this.loading = false;
            // Highlight code after DOM update
            this.$nextTick(() => {
              if (window.Prism && this.$refs.codeBlock) {
                Prism.highlightElement(this.$refs.codeBlock);
              }
              // iframe preview loads DolphinCSS via ?preview=true — no injection needed
            });
          }
        },

        async handleLike() {
          if (this.liked) return;
          this.liked = true;
          this.comp.likes++;
          try {
            await fetch(`${this.API_BASE}/${encodeURIComponent(this.comp.name)}/like`, { method: 'POST' });
          } catch (e) {
            // silent fail; optimistic update already done
          }
        },

        async handleShare() {
          this.comp.shares++;
          try {
            await navigator.clipboard.writeText(window.location.href);
            await fetch(`${this.API_BASE}/${encodeURIComponent(this.comp.name)}/share`, { method: 'POST' });
          } catch (e) {}
        },

        async copyCode() {
          try {
            await navigator.clipboard.writeText(this.comp.htmlCode);
            this.copied = true;
            setTimeout(() => this.copied = false, 2000);
          } catch (e) {}
        },

        resizeIframe(iframe) {
          try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            // Wait a tick for content to paint
            requestAnimationFrame(() => {
              const h = doc.body ? doc.body.scrollHeight : 320;
              iframe.style.height = Math.max(h + 32, 200) + 'px';
            });
          } catch (e) {
            // Cross-origin fallback — keep default height
          }
        },

        async submitComment() {
          if (!this.newComment.user.trim() || !this.newComment.text.trim()) return;
          this.submitting = true;
          try {
            const res = await fetch(`${this.API_BASE}/${encodeURIComponent(this.comp.name)}/comment`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.newComment),
            });
            const data = await res.json();
            if (data.success) {
              this.comp.comments.push({ user: this.newComment.user, text: this.newComment.text, date: new Date() });
              this.newComment = { user: '', text: '' };
            }
          } catch (e) {
            // Optimistic push if API not ready
            this.comp.comments.push({ user: this.newComment.user, text: this.newComment.text, date: new Date() });
            this.newComment = { user: '', text: '' };
          } finally {
            this.submitting = false;
          }
        }
      }
    }
  </script>
</body>
</html>
