{/* Pure CSS Drawer using Checkbox Hack */}
<div className="relative z-50">
  <input type="checkbox" id="dolphin-drawer-toggle" className="peer hidden" />
  
  {/* Trigger Button */}
  <label htmlFor="dolphin-drawer-toggle" className="btn btn-primary glass">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    <span>Open Drawer</span>
  </label>

  {/* Overlay */}
  <label htmlFor="dolphin-drawer-toggle" className="fixed inset-0 bg-black/40 backdrop-blur-sm opacity-0 invisible peer-checked:opacity-100 peer-checked:visible transition-all duration-300 z-40 cursor-pointer"></label>

  {/* Drawer Sidebar */}
  <div className="fixed top-0 left-0 w-80 h-full glass bg-surface/80 backdrop-blur-2xl border-r border-border/50 shadow-2xl -translate-x-full peer-checked:translate-x-0 transition-transform duration-300 z-50 flex flex-col">
    <div className="p-4 border-b border-border/50 flex items-center justify-between">
      <h3 className="text-xl font-bold text-text">Dolphin Drawer</h3>
      <label htmlFor="dolphin-drawer-toggle" className="p-2 rounded-full hover:bg-surface-alt/50 cursor-pointer transition-colors text-text-muted hover:text-danger">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </label>
    </div>
    
    <div className="p-4 overflow-y-auto flex-1 space-y-2">
      <a href="#" className="block p-3 rounded-xl hover:bg-primary/10 hover:text-primary transition-colors text-text-muted font-medium">Dashboard</a>
      <a href="#" className="block p-3 rounded-xl hover:bg-primary/10 hover:text-primary transition-colors text-text-muted font-medium">Analytics</a>
      <a href="#" className="block p-3 rounded-xl hover:bg-primary/10 hover:text-primary transition-colors text-text-muted font-medium">Settings</a>
      <a href="#" className="block p-3 rounded-xl hover:bg-primary/10 hover:text-primary transition-colors text-text-muted font-medium">Support</a>
    </div>
    
    <div className="p-4 border-t border-border/50">
      <div className="flex items-center gap-3">
        <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-primary to-secondary p-[2px]">
          <div className="w-full h-full rounded-full bg-surface overflow-hidden">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dolphin" alt="User" className="w-full h-full object-cover" />
          </div>
        </div>
        <div>
          <p className="text-sm font-semibold text-text">Dolphin User</p>
          <p className="text-xs text-text-muted">Pro Member</p>
        </div>
      </div>
    </div>
  </div>
</div>
