<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push Component — DolphinCSS UI Bank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    textarea, input, select { font-family: 'Inter', sans-serif; }
    #code-editor { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* Preview iframe */
    .preview-frame { border: none; width: 100%; min-height: 300px; border-radius: 12px; background: transparent; }

    /* Animated gradient border on focus */
    .glow-focus:focus-within {
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }

    /* Tag pill */
    .tag-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 999px;
      background: #e0e7ff; color: #4338ca;
      font-size: 12px; font-weight: 500;
    }

    /* Status toast */
    .toast-enter { animation: slideUp 0.3s ease; }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen"
  x-data="pushForm()"
  x-init="init()">

  <!-- ── Navbar ─────────────────────────────────────────────────────────── -->
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-2 text-slate-800 hover:text-indigo-600 transition-colors">
          <span class="text-xl">🐬</span>
          <span class="font-bold text-lg">DolphinCSS</span>
        </a>
        <span class="text-slate-300">/</span>
        <span class="text-slate-500 font-medium">Push Component</span>
      </div>
      <a href="/" class="text-sm text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-1">
        ← Back to UI Bank
      </a>
    </div>
  </nav>

  <!-- ── Main Layout ─────────────────────────────────────────────────────── -->
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-800">Push Component</h1>
      <p class="text-slate-500 mt-1">Add a new component or update an existing one in the DolphinCSS registry.</p>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

      <!-- ── LEFT: Form ──────────────────────────────────────────────────── -->
      <div class="space-y-5">

        <!-- Secret Key -->
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-start gap-3">
          <span class="text-amber-500 text-lg mt-0.5">🔑</span>
          <div class="flex-1">
            <p class="text-sm font-semibold text-amber-800 mb-2">Admin Secret</p>
            <input
              x-model="form.secret"
              type="password"
              placeholder="Enter admin secret key..."
              class="w-full px-3 py-2 rounded-lg border border-amber-200 bg-white text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"
            />
          </div>
        </div>

        <!-- Component Identity -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-4">
          <h2 class="font-semibold text-slate-700 flex items-center gap-2">
            <span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-xs font-bold">1</span>
            Component Identity
          </h2>

          <!-- Name -->
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Component Name *</label>
            <div class="glow-focus rounded-lg border border-slate-200 overflow-hidden">
              <div class="flex items-center">
                <span class="px-3 text-slate-400 text-sm bg-slate-50 border-r border-slate-200 py-2.5 shrink-0">dolphin-</span>
                <input
                  x-model="nameInput"
                  @input="form.name = 'dolphin-' + nameInput.toLowerCase().replace(/[^a-z0-9-]/g,'')"
                  type="text"
                  placeholder="login"
                  class="flex-1 px-3 py-2.5 text-sm text-slate-700 focus:outline-none bg-white"
                />
              </div>
            </div>
            <p class="text-xs text-slate-400 mt-1" x-text="'Marker: ' + form.name"></p>
          </div>

          <!-- Username + Version row -->
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Username</label>
              <input x-model="form.username" type="text" placeholder="core"
                class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white" />
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Version</label>
              <input x-model="form.version" type="text" placeholder="1.0.0"
                class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white" />
            </div>
          </div>

          <!-- Variant + Category row -->
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Variant</label>
              <select x-model="form.variant"
                class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                <option value="default">default</option>
                <option value="glass">glass</option>
                <option value="minimal">minimal</option>
                <option value="dark">dark</option>
                <option value="pro">pro</option>
                <option value="outline">outline</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Category</label>
              <select x-model="form.category"
                class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                <option value="general">general</option>
                <option value="elements">elements</option>
                <option value="forms">forms</option>
                <option value="navigation">navigation</option>
                <option value="interactive">interactive</option>
                <option value="layout">layout</option>
                <option value="data">data</option>
                <option value="feedback">feedback</option>
                <option value="marketing">marketing</option>
              </select>
            </div>
          </div>

          <!-- Author + isOfficial -->
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Author Display Name</label>
              <input x-model="form.author" type="text" placeholder="DolphinCSS Core"
                class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white" />
            </div>
            <div class="flex flex-col justify-end pb-1">
              <label class="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" x-model="form.isOfficial"
                  class="w-4 h-4 rounded border-slate-300 accent-indigo-600" />
                <span class="text-sm font-medium text-slate-600">Mark as Official</span>
              </label>
              <p class="text-xs text-slate-400 mt-1">⭐ Official components appear first</p>
            </div>
          </div>

          <!-- Tags -->
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Tags</label>
            <div class="flex gap-2">
              <input
                x-model="tagInput"
                @keydown.enter.prevent="addTag()"
                @keydown.comma.prevent="addTag()"
                type="text"
                placeholder="Type tag + Enter"
                class="flex-1 px-3 py-2.5 rounded-lg border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white"
              />
              <button @click="addTag()"
                class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
                Add
              </button>
            </div>
            <div class="flex flex-wrap gap-2 mt-2" x-show="form.tags.length > 0">
              <template x-for="(tag, i) in form.tags" :key="i">
                <span class="tag-pill">
                  <span x-text="tag"></span>
                  <button @click="removeTag(i)" class="text-indigo-400 hover:text-red-500 transition-colors font-bold leading-none">×</button>
                </span>
              </template>
            </div>
          </div>

          <!-- Description -->
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Description</label>
            <textarea x-model="form.description" rows="2" placeholder="Short description..."
              class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white resize-none"></textarea>
          </div>
        </div>

        <!-- Code Editor -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-3">
          <div class="flex items-center justify-between">
            <h2 class="font-semibold text-slate-700 flex items-center gap-2">
              <span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-xs font-bold">2</span>
              JSX / HTML Code
            </h2>
            <div class="flex items-center gap-2">
              <span class="text-xs text-slate-400" x-text="form.code.length + ' chars'"></span>
              <button @click="refreshPreview()"
                class="text-xs px-3 py-1.5 bg-slate-100 hover:bg-indigo-50 hover:text-indigo-600 text-slate-600 rounded-lg transition-colors font-medium flex items-center gap-1">
                ↻ Preview
              </button>
            </div>
          </div>
          <textarea
            id="code-editor"
            x-model="form.code"
            @input.debounce.1000ms="refreshPreview()"
            rows="18"
            placeholder="Paste your JSX or HTML component code here...&#10;&#10;Example:&#10;&lt;div className=&quot;card p-6&quot;&gt;&#10;  &lt;h2 className=&quot;text-xl font-bold&quot;&gt;Hello&lt;/h2&gt;&#10;&lt;/div&gt;"
            class="w-full px-3 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none leading-relaxed"
          ></textarea>
        </div>

        <!-- Push Button -->
        <button
          @click="pushComponent()"
          :disabled="pushing || !form.name || !form.code || !form.secret"
          class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2"
        >
          <template x-if="pushing">
            <span class="flex items-center gap-2">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              Pushing...
            </span>
          </template>
          <template x-if="!pushing">
            <span>🚀 Push to Registry</span>
          </template>
        </button>

      </div>

      <!-- ── RIGHT: Live Preview ──────────────────────────────────────────── -->
      <div class="space-y-5">

        <!-- Preview Card -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden sticky top-20">
          <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-red-400"></div>
              <div class="w-3 h-3 rounded-full bg-amber-400"></div>
              <div class="w-3 h-3 rounded-full bg-green-400"></div>
              <span class="ml-2 text-sm font-medium text-slate-500">Live Preview</span>
            </div>
            <div class="flex items-center gap-2">
              <!-- marker badge -->
              <template x-if="form.name">
                <code class="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded font-mono" x-text="form.name + (form.variant !== 'default' ? '--' + form.variant : '')"></code>
              </template>
              <template x-if="form.isOfficial">
                <span class="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-full font-medium flex items-center gap-1">
                  ⭐ Official
                </span>
              </template>
            </div>
          </div>

          <!-- iframe preview -->
          <div class="relative" style="min-height: 400px;">
            <template x-if="!form.code">
              <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-300 gap-3">
                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                </svg>
                <p class="text-sm font-medium">Paste code to see preview</p>
              </div>
            </template>
            <template x-if="form.code">
              <iframe
                id="preview-frame"
                class="preview-frame"
                style="min-height: 420px;"
                sandbox="allow-scripts allow-same-origin"
              ></iframe>
            </template>
          </div>

          <!-- Meta info bar -->
          <div class="px-5 py-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between flex-wrap gap-2">
            <div class="flex items-center gap-3 text-xs text-slate-400">
              <span x-text="form.username + '/' + (form.name || '?') + '@' + form.version"></span>
            </div>
            <div class="flex items-center gap-2 text-xs text-slate-400">
              <span x-text="form.category"></span>
              <span>·</span>
              <span x-text="form.variant"></span>
            </div>
          </div>
        </div>

        <!-- Recent Pushes (simple log) -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5" x-show="pushLog.length > 0">
          <h3 class="font-semibold text-slate-700 mb-3 text-sm">Recent Pushes</h3>
          <div class="space-y-2">
            <template x-for="log in pushLog.slice().reverse()" :key="log.time">
              <div class="flex items-center gap-3 p-2.5 rounded-lg"
                :class="log.success ? 'bg-green-50 border border-green-100' : 'bg-red-50 border border-red-100'">
                <span x-text="log.success ? '✅' : '❌'"></span>
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-medium text-slate-700 truncate" x-text="log.name"></p>
                  <p class="text-xs text-slate-400" x-text="log.msg"></p>
                </div>
                <span class="text-xs text-slate-400 shrink-0" x-text="log.time"></span>
              </div>
            </template>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────────────────── -->
  <div class="fixed bottom-6 right-6 z-50 space-y-2">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="toast-enter flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg text-sm font-medium min-w-64"
        :class="toast.type === 'success' ? 'bg-green-600 text-white' : toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'">
        <span x-text="toast.icon"></span>
        <span x-text="toast.msg"></span>
      </div>
    </template>
  </div>

  <script>
    function pushForm() {
      return {
        nameInput: '',
        tagInput: '',
        pushing: false,
        toasts: [],
        pushLog: [],

        form: {
          name:        'dolphin-',
          username:    'core',
          author:      'DolphinCSS Core',
          version:     '1.0.0',
          variant:     'default',
          category:    'general',
          tags:        [],
          description: '',
          isOfficial:  true,
          code:        '',
          secret:      ''
        },

        init() {
          // Try to restore secret from sessionStorage
          const saved = sessionStorage.getItem('dolphin_admin_secret');
          if (saved) this.form.secret = saved;
        },

        addTag() {
          const t = this.tagInput.trim().replace(/,$/,'');
          if (t && !this.form.tags.includes(t)) this.form.tags.push(t);
          this.tagInput = '';
        },

        removeTag(i) {
          this.form.tags.splice(i, 1);
        },

        refreshPreview() {
          if (!this.form.code) return;
          const frame = document.getElementById('preview-frame');
          if (!frame) return;

          // Build a preview URL-like call using the current code
          // We POST to a temp preview endpoint
          const previewHtml = this.buildPreviewHtml(this.form.code);
          frame.srcdoc = previewHtml;

          // Auto-resize after load
          frame.onload = () => {
            try {
              const h = frame.contentDocument?.body?.scrollHeight;
              if (h) frame.style.height = Math.max(300, h + 40) + 'px';
            } catch(e) {}
          };
        },

        buildPreviewHtml(code) {
          // Client-side JSX→HTML quick conversion (mirrors server jsxToHtml)
          let html = code
            .replace(/style=\{\{([\s\S]*?)\}\}/g, (_, b) => {
              const css = b.split(',').map(p => {
                const ci = p.indexOf(':');
                if (ci < 0) return '';
                const k = p.slice(0,ci).trim().replace(/['"]/g,'');
                const v = p.slice(ci+1).trim().replace(/^['"]|['"]$/g,'');
                return k.replace(/([A-Z])/g,'-$1').toLowerCase() + ': ' + v;
              }).filter(Boolean).join('; ');
              return css ? `style="${css}"` : '';
            })
            .replace(/\bon[A-Z]\w+=\{[^}]*\}/g, '')
            .replace(/\bclassName=/g, 'class=')
            .replace(/\bhtmlFor=/g, 'for=')
            .replace(/\bstrokeWidth=/g, 'stroke-width=')
            .replace(/\btabIndex=/g, 'tabindex=')
            .replace(/\bautoComplete=/g, 'autocomplete=')
            .replace(/\breadOnly\b/g, 'readonly')
            .replace(/\bdefaultValue=/g, 'value=');

          // Remove remaining JSX components (uppercase tags)
          html = html.replace(/<([A-Z][a-zA-Z]+)(\s[^>]*)?\s*\/>/g, '');

          return `<!DOCTYPE html>
<html data-theme="dolphin" data-theme-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/dolphin-css.min.css">
  <style>
    html,body{margin:0;padding:0;min-height:100vh;
      background:
        radial-gradient(ellipse at 20% 20%,oklch(30% .12 240) 0%,transparent 55%),
        radial-gradient(ellipse at 80% 80%,oklch(25% .10 200) 0%,transparent 55%),
        oklch(13% .04 225);
      color-scheme:dark;}
    body{display:flex;justify-content:center;align-items:flex-start;padding:2rem;box-sizing:border-box;}
    .pw{width:100%;max-width:600px;}
  </style>
</head>
<body>
  <div class="pw">${html}</div>
</body>
</html>`;
        },

        async pushComponent() {
          if (!this.form.name || !this.form.code || !this.form.secret) {
            this.showToast('error', '❌', 'Name, code and secret are required!');
            return;
          }
          this.pushing = true;

          // Save secret to session
          sessionStorage.setItem('dolphin_admin_secret', this.form.secret);

          try {
            const res = await fetch('/api/templates/push', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-admin-secret': this.form.secret
              },
              body: JSON.stringify({
                name:        this.form.name,
                code:        this.form.code,
                username:    this.form.username,
                author:      this.form.author,
                version:     this.form.version,
                variant:     this.form.variant,
                category:    this.form.category,
                tags:        this.form.tags,
                description: this.form.description,
                isOfficial:  this.form.isOfficial
              })
            });

            const data = await res.json();

            if (data.success) {
              const marker = data.data.marker;
              this.showToast('success', '🚀', `Pushed! Marker: ${marker}`);
              this.pushLog.push({
                success: true,
                name: data.data.name,
                msg: `${data.data.slug} · marker: ${marker}`,
                time: new Date().toLocaleTimeString()
              });
            } else {
              this.showToast('error', '❌', data.error || 'Push failed');
              this.pushLog.push({
                success: false,
                name: this.form.name,
                msg: data.error,
                time: new Date().toLocaleTimeString()
              });
            }
          } catch(e) {
            this.showToast('error', '❌', 'Network error: ' + e.message);
          } finally {
            this.pushing = false;
          }
        },

        showToast(type, icon, msg) {
          const id = Date.now();
          this.toasts.push({ id, type, icon, msg });
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 4000);
        }
      };
    }
  </script>
</body>
</html>
